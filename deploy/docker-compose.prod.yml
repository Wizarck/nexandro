# nexandro — operator deployment for nexandro.palafitofood.com
# m3.x-app-bootstrap-and-vps-deploy slice §3.3 + ADR-DUAL-COMPOSE-COMMUNITY-VS-OPERATOR.
#
# Audience: operator on a host that already runs cloudflared (palafito
# host = cx43, 62.238.3.180, x86_64). Binds the app to 127.0.0.1:3201 so
# the port is unreachable from eth0 — defense-in-depth alongside UFW.
# Cloudflared routes nexandro.palafitofood.com → http://localhost:3201
# (see deploy/cloudflared-ingress-trattos.snippet.yml).
#
# Usage on VPS:
#   mkdir -p /opt/nexandro && cd /opt/nexandro
#   scp local:deploy/docker-compose.prod.yml ./docker-compose.yml
#   scp local:deploy/.env.example ./
#   cp .env.example .env  # then edit POSTGRES_PASSWORD via `pwgen 32 1`
#   docker compose pull
#   docker compose up -d
#
# For community / laptop quickstart use the repo-root docker-compose.yml.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
    volumes:
      - nexandro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    image: ghcr.io/wizarck/nexandro:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FRONTEND_URL: ${FRONTEND_URL:?set in .env}
      PORT: "3001"
      # DEMO_MODE: seeds 1 OWNER user + 1 org on first boot and injects
      # them on every request (DemoAuthMiddleware). Disable for real tenants.
      DEMO_MODE: "${DEMO_MODE:-true}"
      OTEL_SDK_DISABLED: "${OTEL_SDK_DISABLED:-true}"
      NEXANDRO_EMAIL_PROVIDER: "${NEXANDRO_EMAIL_PROVIDER:-smtp}"
      AUDIT_ARCHIVAL_ENABLED: "${AUDIT_ARCHIVAL_ENABLED:-false}"
      PHOTO_STORAGE_ENABLED: "${PHOTO_STORAGE_ENABLED:-false}"
      M3_PO_AGGREGATE_ENABLED: "${M3_PO_AGGREGATE_ENABLED:-false}"
      NEXANDRO_AGENT_ENABLED: "${NEXANDRO_AGENT_ENABLED:-false}"
      # Brand-mark uploads (Owner settings UX). Default storage is the
      # local-fs adapter writing to a Docker volume — works out of the box.
      # To switch to S3/R2, set NEXANDRO_BRAND_ASSET_STORAGE=s3 in .env and
      # the matching S3_* env vars (see apps/api/src/brand-assets/brand-assets.module.ts).
      NEXANDRO_BRAND_ASSET_STORAGE: "${NEXANDRO_BRAND_ASSET_STORAGE:-local}"
      NEXANDRO_BRAND_ASSET_LOCAL_DIR: "/var/lib/nexandro/brand-marks"
      NEXANDRO_BRAND_ASSET_PUBLIC_URL_BASE: "/static/brand-marks"
      NEXANDRO_BRAND_ASSET_S3_ENDPOINT: "${NEXANDRO_BRAND_ASSET_S3_ENDPOINT:-}"
      NEXANDRO_BRAND_ASSET_S3_REGION: "${NEXANDRO_BRAND_ASSET_S3_REGION:-auto}"
      NEXANDRO_BRAND_ASSET_S3_BUCKET: "${NEXANDRO_BRAND_ASSET_S3_BUCKET:-}"
      NEXANDRO_BRAND_ASSET_S3_ACCESS_KEY_ID: "${NEXANDRO_BRAND_ASSET_S3_ACCESS_KEY_ID:-}"
      NEXANDRO_BRAND_ASSET_S3_SECRET_ACCESS_KEY: "${NEXANDRO_BRAND_ASSET_S3_SECRET_ACCESS_KEY:-}"
      NEXANDRO_BRAND_ASSET_S3_PUBLIC_URL_BASE: "${NEXANDRO_BRAND_ASSET_S3_PUBLIC_URL_BASE:-}"
    # Loopback-only bind matches the modern VPS pattern on cx43
    # (actual-server, palafito-staging-wp, nexandro-postgres-test).
    # Cloudflared on the host reaches us via 127.0.0.1:3201.
    ports:
      - "127.0.0.1:3201:3001"
    volumes:
      - nexandro_brand_marks:/var/lib/nexandro/brand-marks

volumes:
  nexandro_pgdata:
  nexandro_brand_marks:
