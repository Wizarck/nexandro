# mcp-servers.yaml — PROJECT layer for nexandro.
# Merged with ai-playbook/mcp-servers-base.yaml (universal) and personal layer
# via `python .ai-playbook/scripts/mcp/render.py --project nexandro`.
#
# Per specs/memory-hierarchy.md, nexandro is a public/community repo so it
# uses bank `nexandro-palafito` and has NO personal-add-on bank.

schema: mcp-servers/v1
version: 0.1.0
layer: project
project: nexandro

servers:
  hindsight:
    id: hindsight
    description: Hindsight memory for the nexandro bank — recall + retain via REST.
    transport: http
    endpoint: https://eligia-hindsight.palafitofood.com
    env:
      required: [HINDSIGHT_URL, HINDSIGHT_BANK_ID, CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET]
      optional: [HINDSIGHT_TIMEOUT_MS]
    auth: cf-access
    scope: project
    capabilities_hint: [recall, retain]
